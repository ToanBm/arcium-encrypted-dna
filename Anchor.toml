[toolchain]
anchor_version = "0.32.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
encrypted_dna = "CHuSJgXRpjjkAh2jTnj1aDEx2EvwQD1XnmN1htdKE4hv"

[programs.devnet]
encrypted_dna = "CHuSJgXRpjjkAh2jTnj1aDEx2EvwQD1XnmN1htdKE4hv"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test]
startup_wait = 60000
shutdown_wait = 5000

[test.validator]
bind_address = "172.17.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 8899
